<!DOCTYPE html>
<html>
<head>
    <title>Checkout - Eco Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Eco-Friendly Products</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="about.html">About</a>
        </nav>
    </header>
    <h2>Checkout</h2>
    <div style="max-width: 500px; margin: auto; padding: 20px;">
        <label>Name:</label>
        <input type="text" id="name" placeholder="Your name" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>
        <label>Email:</label>
        <input type="text" id="email" placeholder="Your email" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>
        <label>Address:</label>
        <input type="text" id="address" placeholder="Your address" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>
        <label>Card Number:</label>
        <input type="text" id="card" placeholder="1234 5678 9012 3456" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>
        <div style="text-align:center; margin-top: 20px;">
            <button onclick="placeOrder()" style="background-color:#FFC439; color:#003087; font-weight:bold; font-size:16px; padding:12px 30px; border:none; border-radius:25px; cursor:pointer;">
                Pay with <span style="color:#009cde;">Pay</span><span style="color:#003087;">Pal</span>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
