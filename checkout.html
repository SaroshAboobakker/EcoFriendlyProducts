<!DOCTYPE html>
<html>
<head>
    <title>Checkout - Eco Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Eco-Friendly Products</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="about.html">About</a>
        </nav>
    </header>
    <h2>Checkout</h2>
    <div style="max-width: 500px; margin: auto; padding: 20px;">
        <label>Name:</label>
        <input type="text" placeholder="Your name" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>
        <label>Email:</label>
        <input type="text" placeholder="Your email" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>
        <label>Address:</label>
        <input type="text" placeholder="Your address" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>
        <label>Card Number:</label>
        <input type="text" placeholder="1234 5678 9012 3456" style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; border:1px solid #ccc;"><br>
        <div style="text-align:center;">
            <button onclick="placeOrder()">Place Order</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
